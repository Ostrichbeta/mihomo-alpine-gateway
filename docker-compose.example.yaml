# Default: create a new macvlan network.
# Change parent to your host's physical interface (e.g. eth0, enp2s0).

services:
  mihomo:
    image: ghcr.io/<owner>/mihomo-gateway:latest
    container_name: mihomo-gateway
    restart: unless-stopped
    privileged: true
    # Unprivileged alternative, still with macvlan:
    # remove "privileged: true" above and use all of these instead.
    # macvlan provides the LAN IP; these grant TUN/routing/nftables permissions.
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
    # devices:
    #   - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes:
      - ./config.yaml:/etc/mihomo/config.yaml
    environment:
      MIHOMO_DNS: 127.0.0.1#1053
      FALLBACK_DNS_1: 8.8.8.8
      FALLBACK_DNS_2: 1.1.1.1
      WEBUI_ADMIN_PASSWORD: change-me
      WEBUI_PORT: 8080
      # MIHOMO_API_SECRET is generated at boot if omitted.
      # Set this only if you need a stable mihomo controller secret.
      # MIHOMO_API_SECRET: change-me-too
    networks:
      macvlan:
        ipv4_address: 192.168.12.200

networks:
  macvlan:
    driver: macvlan
    driver_opts:
      parent: eth0
    ipam:
      config:
        - subnet: 192.168.12.0/23
          gateway: 192.168.12.254

    # Existing macvlan alternative:
    # If you already created a Docker network named "macvlan", replace this
    # whole macvlan definition with:
    #
    # external: true
    #
    # Example:
    # docker network create -d macvlan --subnet=192.168.12.0/23 \
    #   --gateway=192.168.12.254 -o parent=eth0 macvlan
