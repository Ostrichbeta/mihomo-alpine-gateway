name: Build and Push Images

on:
  workflow_dispatch:
  schedule:
    # Check for new mihomo release every 3 days at 08:00 UTC
    - cron: "0 0 */3 * *"

env:
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_version.outputs.should_build }}
      version: ${{ steps.check_version.outputs.version }}
      version_num: ${{ steps.check_version.outputs.version_num }}
    steps:
      - name: Resolve latest mihomo version
        id: check_version
        run: |
          VERSION=$(curl -sI https://github.com/MetaCubeX/mihomo/releases/latest \
            | grep -i '^location:' \
            | sed 's#.*/tag/##' \
            | tr -d '\r\n')
          VERSION_NUM="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_num=$VERSION_NUM" >> "$GITHUB_OUTPUT"

          # For manual triggers, always build
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For scheduled runs, check if this version was already built
          EXISTING=$(curl -sf "https://ghcr.io/v2/${GITHUB_REPOSITORY,,}/tags/list" \
            -H "Authorization: Bearer $(curl -sf "https://ghcr.io/token?scope=repository:${GITHUB_REPOSITORY,,}:pull" | jq -r '.token')" \
            | jq -r ".tags[]?" 2>/dev/null | grep -x "amd64-v3-${VERSION_NUM}" || true)

          if [ -n "$EXISTING" ]; then
            echo "Version ${VERSION_NUM} already built, skipping" >&2
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION_NUM} detected, building" >&2
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            variant: v1
            tag_suffix: amd64-v1
          - platform: linux/amd64
            variant: v2
            tag_suffix: amd64-v2
          - platform: linux/amd64
            variant: v3
            tag_suffix: amd64-v3
          - platform: linux/arm64
            variant: ""
            tag_suffix: arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            MIHOMO_VARIANT=${{ matrix.variant }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.tag_suffix }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.tag_suffix }}-${{ needs.check.outputs.version_num }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  manifest:
    needs: [check, build]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          REPO="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          VERSION_NUM="${{ needs.check.outputs.version_num }}"

          docker buildx imagetools create \
            -t "${REPO}:latest" \
            "${REPO}:amd64-v3" \
            "${REPO}:arm64"

          docker buildx imagetools create \
            -t "${REPO}:${VERSION_NUM}" \
            "${REPO}:amd64-v3-${VERSION_NUM}" \
            "${REPO}:arm64-${VERSION_NUM}"
